name: CI

on:
  push:
    branches:
      - main
      - codex/**
    tags:
      - 'release/*'
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      REDIS_URL: locmem://dorso
      DJANGO_SECRET_KEY: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend tests
        run: |
          pytest backend

  shared-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: |
          npm ci
      - name: Validate challenge packs
        run: |
          npm run validate:packs
      - name: Install shared dependencies
        run: |
          cd src/shared
          npm install
      - name: Run shared tests
        run: |
          cd src/shared
          npm test -- --runInBand
      - name: Build extension bundles
        run: |
          npm run build

  deploy-badge-staging:
    if: startsWith(github.ref, 'refs/tags/release/')
    needs: shared-js
    runs-on: ubuntu-latest
    environment: cloudflare-staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy badge worker to staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare
          command: deploy --env staging
          environment: staging
          secrets: |
            CF_HMAC_SECRET
        env:
          CF_HMAC_SECRET: ${{ secrets.CF_HMAC_SECRET }}

  deploy-badge-production:
    if: startsWith(github.ref, 'refs/tags/release/')
    needs: deploy-badge-staging
    runs-on: ubuntu-latest
    environment: cloudflare-production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy badge worker to production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare
          command: deploy --env production
          environment: production
          secrets: |
            CF_HMAC_SECRET
        env:
          CF_HMAC_SECRET: ${{ secrets.CF_HMAC_SECRET }}
