<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rakuzaichi Settings</title>
  <link rel="icon" href="./icon/48.png">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="vault-shell">
    <aside class="vault-sidebar" aria-label="Vault navigation">
      <header class="brand-strip">
        <img src="./icon/48.png" alt="Rakuzaichi logo">
        <div>
          <h1>Rakuzaichi</h1>
          <p>Local vault</p>
        </div>
      </header>

      <section class="nav-group" aria-label="Folders">
        <h2>Folders</h2>
        <button id="allChatsFolder" class="nav-row active" type="button"><span>All chats</span><strong id="vault-count">0</strong></button>
        <button class="nav-row" type="button"><span>Pinned</span><strong>0</strong></button>
        <button class="nav-row" type="button"><span>Archived</span><strong>0</strong></button>
        <div class="folder-actions">
          <button id="folderAdd" class="btn btn-secondary" type="button">New</button>
          <button id="folderRename" class="btn btn-secondary" type="button">Rename</button>
          <button id="folderDelete" class="btn btn-ghost" type="button">Delete</button>
        </div>
        <div id="folderTree" class="folder-tree"></div>
      </section>

      <section class="nav-group" aria-label="Tags">
        <h2>Tags</h2>
        <div id="tagFilter" class="tag-grid">
          <button type="button" data-tag="TODO" aria-pressed="false">TODO</button>
          <button type="button" data-tag="FIXME" aria-pressed="false">FIXME</button>
          <button type="button" data-tag="UNRESOLVED" aria-pressed="false">UNRESOLVED</button>
          <button type="button" data-tag="FOLLOWUP" aria-pressed="false">FOLLOWUP</button>
          <button type="button" data-tag="REF" aria-pressed="false">REF</button>
          <button type="button" data-tag="PROMPT" aria-pressed="false">PROMPT</button>
        </div>
        <label>
          Custom tag
          <input id="tagQuery" type="text" placeholder="Filter by tag">
        </label>
      </section>

      <section class="nav-group" aria-label="Filters">
        <h2>Filters</h2>
        <label>
          Platform
          <select id="platformFilter" multiple size="6">
            <option value="chatgpt">ChatGPT</option>
            <option value="claude">Claude</option>
            <option value="gemini">Gemini</option>
            <option value="perplexity">Perplexity</option>
            <option value="deepseek">DeepSeek</option>
            <option value="grok">Grok</option>
            <option value="copilot">Copilot</option>
            <option value="mistral">Mistral</option>
            <option value="huggingchat">HuggingChat</option>
            <option value="poe">Poe</option>
            <option value="kimi">Kimi</option>
            <option value="qwen">Qwen Chat</option>
            <option value="chatglm">ChatGLM</option>
            <option value="doubao">Doubao</option>
            <option value="notebooklm">NotebookLM</option>
          </select>
        </label>
        <label>
          Date
          <select id="dateFilter">
            <option value="all">All time</option>
            <option value="today">Today</option>
            <option value="week">This week</option>
            <option value="month">This month</option>
            <option value="custom">Custom</option>
          </select>
        </label>
        <div id="customDateFields" class="date-grid" hidden>
          <label>
            Start
            <input id="dateStart" type="date">
          </label>
          <label>
            End
            <input id="dateEnd" type="date">
          </label>
        </div>
        <label class="checkbox-label">
          <input id="pinnedOnly" type="checkbox">
          Pinned only
        </label>
        <button id="clearFilters" class="btn btn-ghost filter-clear" type="button">Clear filters</button>
      </section>
    </aside>

    <section class="vault-main" aria-label="Vault browser">
      <header class="vault-topbar">
        <label class="search-box">
          <span>Search</span>
          <input id="vaultSearch" type="search" placeholder="Search chats and messages">
        </label>
        <div id="capture-status" class="capture-status red">
          <span class="capture-dot"></span>
          <span id="capture-status-text">No captures yet.</span>
        </div>
      </header>

      <section class="vault-content">
        <section class="chat-list-pane" aria-label="Chat list">
          <div class="pane-heading">
            <h2>Chats</h2>
            <span id="chat-list-summary">0 captured</span>
          </div>
          <div id="chat-list" class="chat-table" role="table" aria-label="Captured chats"></div>
        </section>

        <section class="chat-detail-pane" aria-label="Chat detail">
          <div class="pane-heading">
            <h2>Detail</h2>
            <div class="pane-actions">
              <button id="detailPin" class="pin-toggle" type="button" disabled aria-label="Pin chat">☆</button>
              <button id="sendToNewChat" class="btn btn-secondary" type="button" disabled>Send to new chat</button>
              <a id="open-original" href="#" aria-disabled="true">Open original</a>
            </div>
          </div>
          <div id="chat-detail" class="chat-detail-body">
            <div class="detail-empty">
              <h3>Select a chat</h3>
              <p>No captured chat selected.</p>
            </div>
          </div>
        </section>
      </section>
    </section>

    <aside class="vault-inspector" aria-label="Settings and diagnostics">
      <section class="panel" aria-label="Export settings">
        <h2>Export preferences</h2>
        <form id="options-form" class="settings-form">
          <label>
            Default format
            <select id="defaultFormat">
              <option value="json">JSON</option>
              <option value="markdown">Markdown</option>
              <option value="csv">CSV</option>
              <option value="tsv">TSV</option>
            </select>
          </label>

          <label>
            Filename template
            <input type="text" id="filenameTemplate" value="{platform}_{title}_{date}.{ext}">
            <small>{platform}, {title}, {date}, {time}, {format}, {ext}</small>
          </label>

          <label>
            Theme
            <select id="darkMode">
              <option value="system">System</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>

          <label>
            Colorscheme
            <select id="colorscheme"></select>
          </label>

          <label class="checkbox-label">
            <input type="checkbox" id="showPreview" checked>
            Show preview confirmation
          </label>

          <label>
            Auto-export interval
            <input type="number" id="autoExportInterval" value="0" min="0" max="1440">
          </label>

          <section class="subpanel" aria-label="Auto-export status">
            <h3>Auto-export</h3>
            <p id="autoExportStatus">Auto-export has not run yet.</p>
          </section>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <span id="save-status"></span>
          </div>
        </form>
      </section>

      <section class="panel" aria-label="Diagnostics">
        <div class="panel-heading">
          <h2>Diagnostics</h2>
          <div class="button-row">
            <button id="download-diagnostics" class="btn btn-secondary" type="button">Download</button>
            <button id="clear-diagnostics" class="btn btn-ghost" type="button">Clear</button>
          </div>
        </div>
        <ul id="diagnostics-list" class="log-list"></ul>
      </section>

      <section class="panel" aria-label="Export history">
        <div class="panel-heading">
          <h2>Export history</h2>
          <div class="button-row">
            <button id="download-history" class="btn btn-secondary" type="button">Download</button>
            <button id="clear-history" class="btn btn-ghost" type="button">Clear</button>
          </div>
        </div>
        <p id="history-summary" class="panel-note">No exports captured yet.</p>
      </section>
    </aside>
  </main>

  <script src="compat.js"></script>
  <script src="logger.js"></script>
  <script src="storage.js"></script>
  <script src="ui/colorschemes.js"></script>
  <script src="history.js"></script>
  <script src="vault/db.js"></script>
  <script src="vault/dao.js"></script>
  <script src="vault/search.js"></script>
  <script src="options/filters.js"></script>
  <script src="options/folders.js"></script>
  <script src="options/chat-list.js"></script>
  <script src="options/chat-detail.js"></script>
  <script src="options.js"></script>
</body>
</html>
